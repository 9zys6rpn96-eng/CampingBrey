version: "3.9"

services:
  db:
    image: postgres:16
    container_name: camping-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: camping
      POSTGRES_PASSWORD: camping
      POSTGRES_DB: camping
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: camping-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://camping:camping@db:5432/camping
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend/frontend
    container_name: camping-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"

volumes:
  db_data: